name: Deploy to GitHub Pages

on:
    push:
        branches:
            - master

permissions:
    contents: write

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: "yarn"

            - name: Install and Build 🏗️
              run: |
                  yarn install
                  yarn build

            - name: Add CNAME
              run: echo "weather-eink.smallsites.dev" > dist/CNAME

            - name: Deploy
              uses: JamesIves/github-pages-deploy-action@v4
              with:
                  folder: dist
                  branch: gh-pages
